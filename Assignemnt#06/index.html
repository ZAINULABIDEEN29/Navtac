<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment #01 | Navtac</title>
    <!-- Tailwind CSS for premium look -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        }
        .animate-fade {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="bg-white p-8 rounded-3xl shadow-2xl border border-slate-100 max-w-md w-full text-center space-y-6">
        <div class="space-y-2">
            <h1 class="text-2xl font-bold text-slate-800">Interactive Image Toggle</h1>
            <p class="text-slate-500 text-sm">Control the visibility of the element below.</p>
        </div>

        <!-- The Image Element (Hidden by default as requested) -->
        <div id="imageContainer" class="relative group aspect-square overflow-hidden rounded-2xl bg-slate-50 border border-slate-100 flex items-center justify-center">
            <img id="toggleImage" 
                 src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                 alt="Premium Abstract Artwork" 
                 class="object-cover w-full h-full animate-fade" 
                 style="display: none;">
            
            <div id="placeholder" class="text-slate-300 flex flex-col items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span class="text-xs font-bold uppercase tracking-widest">Image Hidden</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col gap-3">
            <button id="showBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-100 transition-all flex items-center justify-center gap-2 group active:scale-95">
                <span>Show Image</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            </button>
            <button id="hideBtn" class="bg-red-50 hover:bg-red-100 text-red-600 font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2 group hidden active:scale-95">
                <span>Hide Image</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                </svg>
            </button>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        const image = document.getElementById('toggleImage');
        const showBtn = document.getElementById('showBtn');
        const hideBtn = document.getElementById('hideBtn');
        const placeholder = document.getElementById('placeholder');

        // Logic when user clicks "Show Image"
        showBtn.addEventListener('click', () => {
            // Show the image
            image.style.display = 'block';
            // Hide the placeholder
            placeholder.style.display = 'none';
            // Hide the "Show" button
            showBtn.classList.add('hidden');
            // Show the "Hide" button
            hideBtn.classList.remove('hidden');
        });

        // Logic when user clicks "Hide Image"
        hideBtn.addEventListener('click', () => {
            // Hide the image
            image.style.display = 'none';
            // Show the placeholder
            placeholder.style.display = 'flex';
            // Show the "Show" button
            showBtn.classList.remove('hidden');
            // Hide the "Hide" button
            hideBtn.classList.add('hidden');
        });
    </script>
</body>
</html>
