<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <header>
            <h1>My Tasks<span>.</span></h1>
            <p id="current-date"></p>
        </header>

        <section class="task-input-section">
            <form id="todo-form">
                <div class="input-group">
                    <input type="text" id="todo-input" placeholder="What needs to be done?" autocomplete="off">
                    <button type="submit" id="add-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </div>
            </form>
        </section>

        <section class="stats-section">
            <div class="stat-card">
                <span class="stat-value" id="total-count">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="completed-count">0</span>
                <span class="stat-label">Done</span>
            </div>
        </section>

        <main class="todo-container">
            <ul id="todo-list"></ul>
            <div id="empty-state" class="empty-state">
                <div class="empty-icon">✓</div>
                <p>All clear! Relax or add a new task.</p>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
